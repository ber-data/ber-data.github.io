<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- Stack of catalog cards / directory entries -->
  <g>
    <!-- back card -->
    <rect x="52" y="48" width="152" height="52" rx="6" ry="6" fill="#5B4B7A"/>
    <!-- middle card -->
    <rect x="44" y="76" width="168" height="62" rx="6" ry="6" fill="#6C5B8A"/>
    <!-- front card -->
    <rect x="36" y="112" width="184" height="72" rx="7" ry="7" fill="#352F44"/>
    <!-- tabs on cards -->
    <rect x="64" y="40" width="32" height="12" rx="3" ry="3" fill="#5B4B7A"/>
    <rect x="112" y="68" width="32" height="12" rx="3" ry="3" fill="#6C5B8A"/>
    <rect x="60" y="104" width="32" height="12" rx="3" ry="3" fill="#352F44"/>
  </g>
  <!-- Magnifying glass (search/registry lookup) -->
  <g>
    <circle cx="170" cy="170" r="28" fill="#FFFFFF" stroke="#1F4B2A" stroke-width="6"/>
    <circle cx="170" cy="170" r="18" fill="none" stroke="#1F4B2A" stroke-width="3" opacity="0.4"/>
    <line x1="190" y1="190" x2="214" y2="214" stroke="#1F4B2A" stroke-width="8" stroke-linecap="round"/>
  </g>
  <!-- Text lines on front card -->
  <g stroke="#FFFFFF" stroke-linecap="round">
    <line x1="52" y1="132" x2="140" y2="132" stroke-width="3" opacity="0.85"/>
    <line x1="52" y1="146" x2="120" y2="146" stroke-width="2" opacity="0.6"/>
    <line x1="52" y1="160" x2="130" y2="160" stroke-width="2" opacity="0.6"/>
    <line x1="52" y1="174" x2="110" y2="174" stroke-width="2" opacity="0.5"/>
  </g>
</svg>
