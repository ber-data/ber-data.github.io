site_name: BER Data
site_description: Landing page for the BER Data GitHub organization
site_url: https://ber-data.github.io/
repo_url: https://github.com/ber-data
repo_name: ber-data
edit_uri: edit/main/docs/
copyright: "© 2025 BER Data Lakehouse"

theme:
  name: material
  language: en
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: deep purple
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: deep purple
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github
  favicon: assets/favicon.png
  logo: assets/images/bridge-logo.svg

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/ber-data
  generator: false

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - def_list
  - footnotes
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets

plugins:
  - search
  - awesome-pages
  - git-revision-date-localized:
      enable_creation_date: true
      fallback_to_build_date: true
      enable_git_follow: false
  - minify:
      minify_html: true
      minify_js: true
      minify_css: true
  - blog:
      blog_dir: blog
      post_date_format: medium
      post_url_format: "{date}/{slug}"
      archive: true
      categories: true
  - rss:
      match_path: blog/posts/.*
      date_from_meta:
        as_creation: date
      categories:
        - categories
        - tags

nav:
  - Home: index.md
  - Schemas: schemas.md
  - Projects: projects.md
  - Blog:
    - blog/index.md
